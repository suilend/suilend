{
    "optimistic_loop": true,
    "server": "prover",
    "prover_version": "master",
    "rule": [
        "*ratio_monotonicity*"
    ],
    "method": [
        "0x0::dummy_pool_lending_market::create_obligation",
        "0x0::dummy_pool_lending_market::deposit_liquidity_and_mint_ctokens",
        "0x0::dummy_pool_lending_market::redeem_ctokens_and_withdraw_liquidity",
        "0x0::dummy_pool_lending_market::redeem_ctokens_and_withdraw_liquidity_request",
        "0x0::dummy_pool_lending_market::deposit_ctokens_into_obligation",
        "0x0::dummy_pool_lending_market::borrow",
        "0x0::dummy_pool_lending_market::compound_interest",
        "0x0::dummy_pool_lending_market::borrow_request",
        "0x0::dummy_pool_lending_market::fulfill_liquidity_request",
        "0x0::dummy_pool_lending_market::withdraw_ctokens",
        "0x0::dummy_pool_lending_market::repay",
        "0x0::dummy_pool_lending_market::forgive",
        "0x0::dummy_pool_lending_market::liquidate",
        "0x0::dummy_pool_lending_market::claim_rewards",
        "0x0::dummy_pool_lending_market::init_staker",
        "0x0::dummy_pool_lending_market::rebalance_staker",
        "0x0::dummy_pool_lending_market::unstake_sui_from_staker",
        "0x0::dummy_pool_lending_market::add_reserve",
        "0x0::dummy_pool_lending_market::change_reserve_price_feed",
        "0x0::dummy_pool_lending_market::add_pool_reward",
        "0x0::dummy_pool_lending_market::cancel_pool_reward",
        "0x0::dummy_pool_lending_market::close_pool_reward",
        "0x0::dummy_pool_lending_market::update_rate_limiter_config",
        "0x0::dummy_pool_lending_market::set_fee_receivers",
        "0x0::dummy_pool_lending_market::new_obligation_owner_cap"
    ],
    "msg": "Reserve solvency ratio monotonicity",
    "prover_args": [
        "-maxConcurrentTransforms SIMPLIFIED:1,UNROLL:1,DSA:1",
        "-disabledTransformations HOIST_LOOPS",
        "-maxMergedBranchSize 1000000",
        "-maxCommandCount 10000000",
        "-maxBlockCount 1000000",
        "-tacDumpsWithInternalFunctions true",
        "-callTraceVecElemCount 0",
        "-dumpCodeSizeAnalysis true"
    ]
}