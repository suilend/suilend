{
    "optimistic_loop": true,
    "server": "prover",
    "prover_version": "master",
    "rule": [
        "*liquidatable_implies_unhealthy_*"
    ],
    "msg": "Obligation health consistency",
    "prover_args": [
		"-movePath",
		"build",
		"-maxConcurrentTransforms",
		"SIMPLIFIED:1,UNROLL:1,DSA:1",
		"-disabledTransformations",
		"HOIST_LOOPS",
		"-maxMergedBranchSize",
		"1000000",
		"-maxCommandCount",
		"10000000",
		"-maxBlockCount",
		"1000000",
		"-tacDumpsWithInternalFunctions",
		"true",
		"-callTraceVecElemCount",
		"0",
		"-dumpCodeSizeAnalysis",
		"true",
		"-splitParallel",
		"true",
		"-dontStopAtFirstSplitTimeout",
		"true"
	],
    "smt_timeout": "7200",
    "multi_assert_check": true
}